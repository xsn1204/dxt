<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>同学录 - 余向晴</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 核心布局修复与签名美化 */
        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px dashed #eee;
        }

        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end; /* 确保签名和日期底部对齐 */
        }

        .field {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .field label {
            font-weight: bold;
            color: #666;
            font-size: 14px;
        }

        /* 专门针对“余向晴”签名的可爱手写体调优 */
        .signature {
            /* 字体组合：优先尝试手写类、圆润类中文字体 */
            font-family: "Wawa SC", "STKaiti", "KaiTi", "Comic Sans MS", cursive;
            font-size: 34px; /* 足够大的手写感 */
            color: #4a6fa5;  /* 圆珠笔深蓝色 */
            font-weight: bold;
            display: inline-block;
            transform: rotate(-3deg); /* 灵魂倾斜，增加真实感 */
            letter-spacing: 3px;
            line-height: 1;
            /* 强制移除所有横线 */
            border-bottom: none !important;
            text-decoration: none !important;
        }

        /* 日期部分样式保持端正 */
        .handwritten.date-val {
            font-size: 18px;
            color: #888;
            font-family: "lucida Grande", sans-serif;
        }
                            .progress-indicator {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 6px 10px;
    border-radius: 8px;
    font-family: monospace;
    font-size: 0.85rem;
    z-index: 9999;
}
    </style>                             <div class="progress-indicator">7/39</div></head>

<body>
    <div class="container">
        <header>
            <div class="main-title">
                <h1>同学录 <span class="stars">✨</span></h1>
                <p class="sub-title">FRIENDS' PROFILE</p>
            </div>
        </header>

        <section class="profile-header">
            <div class="photo-frame">
                <img src="https://via.placeholder.com/120x150" alt="余向晴的大头贴">
                <span class="photo-deco"></span>
            </div>
            <div class="basic-info">
                <div class="info-row">
                    <label>名字</label>
                    <span class="handwritten">余向晴</span>
                </div>
                <div class="info-row">
                    <label>生肖</label>
                    <span class="handwritten">🐯</span>
                </div>
                <div class="info-row">
                    <label>星座</label>
                    <span class="handwritten">白羊座</span>
                </div>
                <div class="info-row">
                    <label>QQ号</label>
                    <span class="handwritten">893XXX266</span>
                </div>
                <div class="info-row">
                    <label>兴趣爱好</label>
                    <span class="handwritten">弹钢琴、看杂志、逛贴吧</span>
                </div>
                <div class="info-row">
                    <label>座右铭</label>
                    <span class="handwritten">只要有热爱，平凡的日子也会闪闪发亮～</span>
                </div>
            </div>
        </section>

        <section class="questions">
            <div class="question-item">
                <h3>■ 对我的印象关键词是？</h3>
                <div class="options-grid">
                    <label class="checked">善良</label>
                    <label>勇敢</label>
                    <label>可爱</label>
                    <label>温暖</label>
                    <label class="checked">坚定</label>
                </div>
            </div>

            <div class="question-item">
                <h3>■ 对我的第一印象</h3>
                <p class="handwritten answer-line">超温柔！名字也好好听！</p>
            </div>

            <div class="question-item">
                <h3>■ 想对我说的话</h3>
                <p class="handwritten answer-line">以然学姐，每次遇到不懂的问题，你都耐心教我，真的超感谢（此处省略200字）不管是学习还是生活上，你都是我在实中最喜欢的学姐，希望我们能一直保持联系～</p>
            </div>
                     <div class="question-item">
                <h3>■ 给我的一句祝福</h3>
                       <p class="handwritten answer-line">天天开心！考上理想的高中和大学，成为新闻记者！</p>
                </div>


        </section>
        
    </div>
</body>
</html>
