<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚礼请柬 - 顾时初 & 邓亦橙</title>
    <link rel="stylesheet" href="style1.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">                             <div class="progress-indicator">1/36</div></head>
<body>
    <div class="invitation-card">
        <div class="texture-overlay"></div>

        <header class="header">
            <p class="top-title">「 婚礼请柬 」</p>
            <div class="english-intro">
                <p>The Honour Of Your Presence</p>
                <p>Is Requested At</p>
                <p class="wedding-of">THE WEDDING OF</p>
            </div>
        </header>

        <section class="main-visual">
            <div class="art-logo">
                <span class="my-love">My Love</span>
                <div class="balloon-icon">🎈</div>
            </div>
            <h1 class="names">顾时初 <span class="amp">&</span> 邓亦橙</h1>
        </section>

        <section class="date-info">
            <p class="solar-calendar">2025 . 10 . 10</p>
            <p class="lunar-calendar">乙巳年八月十九 星期五</p>
        </section>

        <section class="timeline">
            <div class="timeline-line"></div>
            <div class="event">
                <div class="icon">🚗</div>
                <p class="label">签到<br>Sign in</p>
                <p class="time">10:58 a.m</p>
            </div>
            <div class="event">
                <div class="icon">💍</div>
                <p class="label">仪式<br>Ceremony</p>
                <p class="time">11:38 a.m</p>
            </div>
            <div class="event">
                <div class="icon">🍽️</div>
                <p class="label">午宴<br>luncheon</p>
                <p class="time">12:18 p.m</p>
            </div>
        </section>

        <section class="illustration">
            <div class="table-art"></div>
        </section>

        <footer class="footer">
            <p class="address-title">| 婚礼地址 |</p>
            <p class="hotel-name">香港丽思卡尔顿酒店 <span>KaaJiDeon Hotel</span></p>
            
            <div class="blessing">
                <p>愿您永远被爱和快乐包围</p>
                <p>期待 · 婚礼见</p>
            </div>
        </footer>
    </div>
</body>
</html>
