<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百度地图 - 搜索结果</title>
    <style>
        :root {
            --bd-blue: #3385ff;
            --shadow: 0 2px 4px rgba(0,0,0,0.2);
            --border-color: #eee;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: "PingFang SC", Arial, sans-serif; overflow: hidden; }

        /* --- 优化：地图背景初始隐藏 --- */
        #map-container {
            position: absolute; width: 100%; height: 100%;
            background-color: #f3f0ea; /* 初始底色 */
            background-image: url('map.png'); 
            background-size: cover;
            z-index: 1;
            opacity: 0; /* 初始透明 */
            transition: opacity 0.8s ease-in-out; /* 平滑淡入 */
        }

        /* 搜索框容器 */
        .searchbox-container {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            display: flex; align-items: center;
            background: #fff; box-shadow: var(--shadow);
            border-radius: 2px; width: 368px; height: 45px;
        }

        .searchbox-input {
            flex: 1; border: none; outline: none;
            padding: 0 15px; font-size: 14px; color: #333;
        }

        .searchbox-divider { width: 1px; height: 20px; background: var(--border-color); }

        .search-btn {
            width: 50px; height: 45px; display: flex; justify-content: center; 
            align-items: center; cursor: pointer; background: var(--bd-blue);
        }
        .search-btn svg { width: 22px; height: 22px; fill: #fff; }

        /* 侧边栏 */
        #sidebar {
            position: absolute; top: 75px; left: 20px; z-index: 1000;
            width: 368px; background: #fff; box-shadow: var(--shadow);
            border-radius: 2px; display: flex; flex-direction: column;
        }

        .tabs { display: flex; border-bottom: 1px solid var(--border-color); }
        .tab-item { flex: 1; text-align: center; padding: 12px 0; font-size: 14px; color: #666; }
        .tab-item.active { color: var(--bd-blue); border-bottom: 2px solid var(--bd-blue); font-weight: bold; }

        /* 加载与结果 */
        #results-content { padding: 20px; min-height: 150px; position: relative; }
        
        .loading-overlay {
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 0;
        }

        .spinner {
            width: 28px; height: 28px;
            border: 3px solid rgba(51, 133, 255, 0.2);
            border-top: 3px solid var(--bd-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #results-list { display: none; } /* 初始隐藏结果 */

        .poi-item { margin-bottom: 15px; border-bottom: 1px solid #f9f9f9; padding-bottom: 10px; }
        .poi-name { color: var(--bd-blue); font-size: 15px; font-weight: bold; }
        .poi-addr { color: #999; font-size: 12px; }

        .map-footer { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(255, 255, 255, 0.9); height: 20px; font-size: 11px; color: #666; padding: 0 10px; display: flex; align-items: center; z-index: 1000; }
    </style>
</head>
<body onload="initPage()">

<div id="map-container"></div>

<div class="searchbox-container">
    <input type="text" id="searchInput" class="searchbox-input" value="芝心芝味（青实中店）">
    <div class="searchbox-divider"></div>
    <div class="search-btn" id="searchBtn">
        <svg viewBox="0 0 24 24"><path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z" /></svg>
    </div>
</div>

<div id="sidebar">
    <div class="tabs">
        <div class="tab-item active">搜索结果</div>
        <div class="tab-item">公交</div>
        <div class="tab-item">驾车</div>
    </div>
    <div id="results-content">
        <div id="loading" class="loading-overlay">
            <div class="spinner"></div>
            <div class="loading-text">正在加载地图数据...</div>
        </div>
        <div id="results-list">
            <div class="poi-item">
           <div class="poi-name">1. 芝心芝味（青实中店）</div>
            <div class="poi-addr">地址：临渊省青州市天云区矿建路 168 号</div>
            <div class="poi-addr">电话：(0312) 2318 XX28</div>
            </div>
            <p style="font-size: 12px; color: #999; text-align: center;">搜索完成</p>
        </div>
    </div>
</div>

<div class="map-footer">
    <span>© 2026 Baidu - GS(2025)4125号</span>
</div>

<script>
    function initPage() {
        const map = document.getElementById('map-container');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results-list');

        // 1. 强制 1秒 延迟后显示背景
        setTimeout(() => {
            map.style.opacity = '1'; // 背景淡入
            loading.style.display = 'none'; // 隐藏加载状态
            results.style.display = 'block'; // 显示搜索结果
        }, 1000);
    }

    // 搜索按钮逻辑
    document.getElementById('searchBtn').onclick = function() {
        const query = document.getElementById('searchInput').value;
        if(query === "") window.location.href = 'map1.html';
        else initPage(); // 重新触发加载流程
    };
</script>

</body>
</html>
