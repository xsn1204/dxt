<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百度地图</title>
    <style>
        :root {
            --bd-blue: #3385ff;
            --shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: "PingFang SC", Arial, sans-serif; overflow: hidden; }

        /* 地图背景 */
        #map-container {
            position: absolute; width: 100%; height: 100%;
            background-color: #f3f0ea;
            background-image: url('map1.png'); /* 确保图片路径正确 */
            background-size: cover;
        }

        /* 左上角搜索区域 - 修复：添加相对定位以便下拉框定位 */
        .searchbox-container {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            display: flex; align-items: center;
            background: #fff; box-shadow: var(--shadow);
            border-radius: 2px; width: 368px; height: 45px;
        }

        .searchbox-input {
            flex: 1; border: none; outline: none;
            padding: 0 15px; font-size: 14px; color: #333;
        }

        .searchbox-divider { width: 1px; height: 20px; background: #eee; }

        .route-btn { width: 45px; height: 45px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .route-btn svg { width: 20px; height: 20px; fill: var(--bd-blue); }

        .search-btn {
            width: 55px; height: 45px; background: var(--bd-blue);
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .search-btn svg { width: 22px; height: 22px; fill: #fff; }

        /* 无结果下拉框样式 */
        .search-suggestion {
            position: absolute;
            top: 45px; /* 紧贴搜索框下方 */
            left: 0; width: 313px; /* 对应输入框宽度 */
            background: white; border: 1px solid #ddd; border-top: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: none; z-index: 1001;
        }
        .suggestion-item { padding: 12px 16px; color: #666; font-size: 14px; }

        /* 其他控件样式 */
        .top-right-tools { position: absolute; top: 20px; right: 20px; z-index: 1000; display: flex; gap: 10px; }
        .tool-item { background: #fff; padding: 0 12px; height: 34px; display: flex; align-items: center; font-size: 12px; color: #666; box-shadow: var(--shadow); border-radius: 2px; cursor: pointer; }
        .user-center { width: 34px; height: 34px; background: var(--bd-blue); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; box-shadow: var(--shadow); }
        .bottom-right-controls { position: absolute; bottom: 30px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 1px; }
        .control-btn { width: 34px; height: 34px; background: #fff; display: flex; justify-content: center; align-items: center; box-shadow: var(--shadow); font-weight: bold; color: #666; cursor: pointer; }
        .map-footer { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(255, 255, 255, 0.8); height: 20px; font-size: 11px; color: #666; padding: 0 10px; display: flex; align-items: center; }
                            .progress-indicator {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 6px 10px;
    border-radius: 8px;
    font-family: monospace;
    font-size: 0.85rem;
    z-index: 9999;
}
    </style>                             <div class="progress-indicator">4/39</div></head>
<body>

<div id="map-container"></div>

<div class="searchbox-container">
    <input type="text" id="mapSearchInput" class="searchbox-input" placeholder="搜地点、查公交、找路线">
    
    <div id="noResultBox" class="search-suggestion">
        <div class="suggestion-item">暂无相关搜索结果</div>
    </div>

    <div class="searchbox-divider"></div>
    <div class="route-btn" title="路线">
        <svg viewBox="0 0 24 24"><path d="M22,12L11,21L9.58,19.58L18.17,11H2V9H18.17L9.58,0.42L11,-0.5L22,12Z" /></svg>
    </div>
    <div class="search-btn" id="mapSearchBtn">
        <svg viewBox="0 0 24 24"><path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z" /></svg>
    </div>
</div>

<div class="top-right-tools">
    <div class="tool-item">全国 <i>▼</i></div>
    <div class="tool-item">路况箱</div>
    <div class="user-center">👤</div>
</div>

<div class="bottom-right-controls">
    <div class="control-btn">+</div>
    <div class="control-btn">−</div>
</div>

<div class="map-footer">
    <span>© 2026 Baidu - GS(2025)4125号</span>
    <span style="margin-left: auto; padding-right: 20px;">200 公里 | <b>Baidu 百度</b></span>
</div>

<script>
    // 获取正确的元素 ID
    const searchInput = document.getElementById('mapSearchInput');
    const searchBtn = document.getElementById('mapSearchBtn');
    const noResultBox = document.getElementById('noResultBox');

    function performSearch() {
        const query = searchInput.value.trim();
        console.log("正在搜索:", query); // 调试用

        if (query === "芝心芝味（青实中店）") {
            // 匹配成功，跳转页面
            window.location.href = 'map.html'; 
        } else if (query !== "") {
            // 匹配失败显示无结果
            noResultBox.style.display = 'block';
        } else {
            noResultBox.style.display = 'none';
        }
    }

    // 绑定点击事件
    searchBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        performSearch();
    });

    // 绑定回车键事件
    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            performSearch();
        }
    });

    // 输入时隐藏提示
    searchInput.addEventListener('input', () => {
        noResultBox.style.display = 'none';
    });

    // 点击外部关闭
    document.addEventListener('click', () => {
        noResultBox.style.display = 'none';
    });
</script>

</body>
</html>
