<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登机牌 - 宋以然</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: "SimSun", "STSong", serif; /* 保持字体 */
            color: #fff; /* 保持文字颜色 */
            padding: 40px 20px;
        }

        /* --- 深蓝色机票样式 --- */
        .air-ticket {
            width: 700px;
            height: 250px;
            background: #fff;
            border-radius: 15px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); /* 保持阴影 */
            margin-bottom: 60px;
            color: #1a2a44; /* 深蓝色文字 */
            transition: all 0.3s ease; /* 添加过渡效果 */
        }

        /* 左侧主要区域 */
        .ticket-main {
            flex: 1.6;
            padding: 25px;
            position: relative;
        }

        /* 右侧存根区域（深蓝色背景） */
        .ticket-stub {
            flex: 0.7;
            background: #1a2a44; /* 保持深蓝色主题 */
            color: #fff;
            padding: 25px;
            border-left: 2px dashed #ccc;
            position: relative;
        }

        /* 详情排版 */
        .info-header { font-size: 10px; color: #888; letter-spacing: 1px; margin-bottom: 2px; text-transform: uppercase; }
        .info-value { font-size: 16px; font-weight: bold; margin-bottom: 15px; }
        .stub-value { font-size: 14px; color: #fff; font-weight: bold; margin-bottom: 12px; }

        .route-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }

        .city-name { font-size: 27px; font-weight: 900; letter-spacing: -1px; }
        
        /* 飞行图标装饰 */
        .flight-path {
            flex: 1;
            text-align: center;
            position: relative;
            border-bottom: 1px dashed #ddd;
            margin: 0 20px;
            padding-bottom: 5px;
        }
        .flight-path::after {
            content: '✈';
            color: #1a2a44;
            font-size: 18px;
        }

        /* 底部提示词 */
        .ticket-footer {
            position: absolute;
            bottom: 20px;
            font-size: 10px;
            color: #aaa;
            letter-spacing: 1px;
        }

        /* 二维码 */
        .qr-placeholder {
            position: absolute;
            bottom: 20px;
            right: 25px;
            width: 50px;
            height: 50px;
            background: #1a2a44;
            padding: 3px;
        }

        /* --- 文案样式 --- */
        .poem-container {
            text-align: center;
            line-height: 2.2;
            letter-spacing: 3px;
            color: #666; /* 初始暗淡 */
            max-width: 600px;
            font-style: italic;
        }

        .poem-line {
            margin-bottom: 10px;
            transition: all 1s ease; /* 保持过渡 */
        }

        .highlight { color: #aaa; } /* 保持高亮颜色 */

        /* 新增：进度指示器样式 */
        .progress-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 6px 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            z-index: 9999;
        }

        body::after {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: repeating-linear-gradient(
            0deg,
            rgba(255, 255, 255, 0.03) 0px,
            rgba(255, 255, 255, 0.03) 1px,
            transparent 1px,
            transparent 2px
        );
        pointer-events: none;
        z-index: 10;
    }
    @keyframes flicker {
            0% { opacity: 0.1; }
            5% { opacity: 0.05; }
            10% { opacity: 0.1; }
            15% { opacity: 0.08; }
            20% { opacity: 0.1; }
            100% { opacity: 0.1; }
        }

        /* 新增：迷宫感、扭曲感、孤独冷漠效果 */
        .air-ticket {
            position: relative;
        }
        .air-ticket::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, rgba(0,0,0,0.2) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.2) 75%, rgba(0,0,0,0.2)),
                        linear-gradient(45deg, rgba(0,0,0,0.2) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.2) 75%, rgba(0,0,0,0.2));
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            opacity: 0.3;
            pointer-events: none; /* 允许点击穿透 */
            animation: maze-drift 10s infinite linear; /* 添加迷宫漂移动画 */
        }

    /* 核心：诗句容器与打字机光标 */
    .poem-container {
        text-align: center; /* 左对齐更有公文/告示感 */
        min-height: 300px;
        width: 500px;

    }

    .poem-line {
        min-height: 1.5em;
        margin-bottom: 12px;
        opacity: 0.8;
        position: relative;
        display: block;
    }

    /* 信号故障动画 (Glitch) */
    @keyframes glitch {
        0% { transform: translate(0); text-shadow: -2px 0 #ff00c1, 2px 0 #00fff9; }
        20% { transform: translate(-2px, 2px); }
        40% { transform: translate(-2px, -2px); text-shadow: 2px 0 #ff00c1, -2px 0 #00fff9; }
        60% { transform: translate(2px, 2px); }
        80% { transform: translate(2px, -2px); }
        100% { transform: translate(0); }
    }

    .glitch-active {
        animation: glitch 0.2s infinite;
        color: #fff !important;
    }

    /* 光标 */
    .cursor {
        display: inline-block;
        width: 8px;
        height: 1.2em;
        background: #666;
        margin-left: 4px;
        vertical-align: middle;
        animation: blink 0.8s infinite;
    }

    @keyframes blink {
        50% { opacity: 0; }
    }
</style>

<body>
<div class="progress-indicator">finalX2️⃣</div>

<div class="air-ticket">
    <div class="ticket-main">
        <div style="display: flex; justify-content: space-between;">
            <div>
                <div class="info-header">Name of Passenger</div>
                <div class="info-value">宋以然 / SONG YIRAN</div>
            </div>
            <div style="text-align: right;">
                <div class="info-header">Flight</div>
                <div class="info-value">MU5318</div>
            </div>
        </div>

        <div class="route-section">
            <div class="city-name">青州</div>
            <div class="flight-path"></div>
            <div class="city-name">香港</div>
        </div>

        <div style="display: flex; gap: 65px;">
            <div>
                <div class="info-header">Date</div>
               <div class="info-value" style="color: #8B0000;">25 MAR</div>
            </div>
            <div>
                <div class="info-header">Boarding Time</div>
                <div class="info-value">🔔09:40</div>
            </div>
            <div>
                <div class="info-header">Gate</div>
                <div class="info-value">B22</div>
            </div>
                       <div>
                <div class="info-header">Seat</div>
                <div class="info-value">17A</div>
            </div>
        </div>

        <div class="ticket-footer">PLEASE ARRIVE AT THE GATE 30 MINUTES BEFORE DEPARTURE.</div>
    
    </div>

    <div class="ticket-stub">
        <div class="info-header" style="color: rgba(255,255,255,0.5);">Passenger</div>
        <div class="stub-value">宋以然 / SONG YIRAN</div>
        
        <div class="info-header" style="color: rgba(255,255,255,0.5); margin-top: 15px;">Route</div>
        <div class="stub-value">QINGZHOU TO SHANGHAI</div>

        <div style="display: flex; justify-content: space-between; margin-top: 15px;">
            <div>
                <div class="info-header" style="color: rgba(255,255,255,0.5);"> SERIAL No.</div>
                <div class="stub-value">080</div>
            </div>
            <div>
                <div class="info-header" style="color: rgba(255,255,255,0.5);">Class</div>
                <div class="stub-value">Y</div>
            </div>
        </div>

       <div style="position: absolute; bottom: 20px; right: 25px; width: 50px;">
    <img src="qr.png" alt="二维码" style="width: 100%; height: auto; display: block;">
</div>
    </div>
</div>

<div class="poem-container" id="typewriter-text"></div>

<script>
const lines = [
    "世界突然暗了！",
    "是谁在恶作剧？",
    "我茫然摸索，",
    "再也找不到光的源头。",
    "走道转角传来低声吟唱的悲凉歌声，",
    "她也有着与我相同的忧伤吗？",
    "——几米《地下铁》"
];

const container = document.getElementById('typewriter-text');

async function typeEffect() {
    for (let i = 0; i < lines.length; i++) {
        const lineDiv = document.createElement('div');
        lineDiv.className = 'poem-line';
        if (i === 0 || i === 5) lineDiv.classList.add('highlight');
        container.appendChild(lineDiv);

        const text = lines[i];
        for (let char of text) {
            // 模拟信号断裂：随机触发抖动
            if (Math.random() > 0.96) {
                lineDiv.classList.add('glitch-active');
                await new Promise(r => setTimeout(r, 150));
                lineDiv.classList.remove('glitch-active');
            }

            lineDiv.innerHTML = text.substring(0, text.indexOf(char) + 1) + '<span class="cursor"></span>';
            await new Promise(r => setTimeout(r, 100 + Math.random() * 100)); // 随机打字速度
        }
        
        // 移除当前行的光标，准备下一行
        lineDiv.querySelector('.cursor').remove();
        await new Promise(r => setTimeout(r, 500)); // 行间停顿
    }
}

// 启动效果
window.onload = () => {
    typeEffect();
    
    // 偶尔让机票也闪烁一下，增加整体不稳定性
    setInterval(() => {
        if(Math.random() > 0.9) {
            document.getElementById('ticket').style.opacity = '0.7';
            setTimeout(() => document.getElementById('ticket').style.opacity = '1', 50);
        }
    }, 2000);
};
</script>
</body>
