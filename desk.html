const MAX_HISTORY = 6;

// 获取历史记录
function getHistory() {
    const history = localStorage.getItem('search_history');
    return history ? JSON.parse(history) : [];
}

// 保存历史记录
function saveHistory(query) {
    if (!query) return;
    let history = getHistory();
    history = history.filter(item => item !== query);
    history.unshift(query);
    history = history.slice(0, MAX_HISTORY);
    localStorage.setItem('search_history', JSON.stringify(history));
}

// 核心搜索与展示函数
function searchSpotlight() {
    const input = document.getElementById('spotlight-input');
    const resultsDiv = document.getElementById('spotlight-results');
    const query = input.value.trim().toLowerCase();
    
    resultsDiv.innerHTML = '';

    // 情况 A：输入框为空
    if (query.length === 0) {
        const history = getHistory();
        // 关键修改：只有当存在历史记录时才显示
        if (history.length > 0) {
            resultsDiv.style.display = 'block';
            history.forEach(item => {
                const itemEl = document.createElement('div');
                itemEl.className = 'result-item';
                // 点击历史记录项：填入文字并触发搜索
                itemEl.onmousedown = (e) => { 
                    e.preventDefault(); // 防止失去焦点导致的列表消失
                    input.value = item;
                    searchSpotlight();
                };
                itemEl.innerHTML = `
                    <div class="result-icon history-icon">🕒</div>
                    <div style="flex-grow:1">
                        <div class="result-label">${item}</div>
                        <div class="result-detail">历史搜索</div>
                    </div>
                `;
                resultsDiv.appendChild(itemEl);
            });
        } else {
            resultsDiv.style.display = 'none';
        }
        return;
    }

    // 情况 B：有输入内容，执行匹配逻辑
    let found = false;
    for (const keyword in FILE_DATABASE) {
        if (keyword.toLowerCase().trim() === query) {
            saveHistory(query); // 匹配成功才存入历史记录
            const dataList = Array.isArray(FILE_DATABASE[keyword]) ? FILE_DATABASE[keyword] : [FILE_DATABASE[keyword]];
            
            dataList.forEach(data => {
                found = true;
                const resultItem = document.createElement('a');
                resultItem.className = 'result-item';
                resultItem.href = data.file;
                resultItem.target = '_blank';
                resultItem.innerHTML = `
                    <div class="result-icon" style="background-color: ${data.color};">${data.icon}</div>
                    <div style="flex-grow:1">
                        <div class="result-label">${data.label}</div>
                        <div class="result-detail">${data.type}</div>
                    </div>
                `;
                resultsDiv.appendChild(resultItem);
            });
        }
    }

    resultsDiv.style.display = 'block';
    if (!found) {
        resultsDiv.innerHTML = '<div style="padding: 10px 15px; color: #999; font-size: 13px;">未找到结果</div>';
    }
}

// 事件监听优化
const spotlightInput = document.getElementById('spotlight-input');

// 聚焦时直接调用搜索函数以判断是否显示历史记录
spotlightInput.addEventListener('focus', searchSpotlight);

// 失去焦点时隐藏

    setTimeout(() => {

});
