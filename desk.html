<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桌面</title>
    <style>
        
        :root {
            --宋宁如意-color: #E63946;
            --dingtalk-color: #1e88e5;
            /* 新增：微信的绿色 */
            --wechat-color: #07C160; 
            --secret-color: #a040a0;
            --desktop-icon-label-color: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
           background-image: url('desk.jpg'); 
            /* 2. 确保图片覆盖整个屏幕 */
            background-size: cover; 
            /* 3. 让图片居中显示 */
            background-position: center;
            /* 4. 防止图片在小窗口时重复显示 */
            background-repeat: no-repeat;
            display: block;
            user-select: text;
        }

        /* --- macOS Top Bar --- */
        .mac-menubar {
            position: fixed; top: 0; left: 0; width: 100%; height: 28px;
            background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; font-size: 13px; 
            color: #333; 
            z-index: 1000;
        }
        .menubar-left span { margin-right: 15px; font-weight: 500; text-shadow: none; }
        .menubar-right span { margin-left: 15px; text-shadow: none; }


        /* --- macOS Dock (底部应用栏) --- */
        .mac-dock {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            height: 64px;
            background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 18px;
            display: flex; align-items: center; padding: 0 12px; gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 999;
        }
        /* Dock 链接样式：重要！覆盖 a 标签的默认下划线 */
        .dock-link {
            text-decoration: none;
            color: inherit; /* 继承父元素的颜色 */
        }
        .dock-icon {
            width: 48px; height: 48px; border-radius: 12px;
            background: linear-gradient(to bottom, #fff, #f0f0f0);
            display: flex; justify-content: center; align-items: center;
            font-size: 26px; cursor: pointer; transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .dock-icon:hover { transform: translateY(-15px) scale(1.1); margin: 0 5px; }


        /* --- 桌面图标 --- */
        /* 移除图标链接的下划线 */
        .desktop-icon-link {
            text-decoration: none; 
        }
        
        .desktop-icons-container {
            position: absolute;
            top: 40px; 
            left: 20px;
            display: flex;
            flex-direction: column;
        }
        .desktop-icon {
            width: 80px; height: 90px;
            display: flex; flex-direction: column; align-items: center;
            margin: 15px 0;
            cursor: pointer;
            text-align: center;
        }
        .icon-image {
            width: 64px; height: 64px; border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
            transition: box-shadow 0.2s;
            font-weight: 700;
        }
        .icon-image:hover { box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.3); } 

        .icon-label {
            margin-top: 5px; font-size: 12px; 
            color: var(--desktop-icon-label-color); 
            background: rgba(255,255,255,0.6); 
            padding: 2px 6px; border-radius: 4px;
            font-weight: 500;
            text-shadow: none; 
            border: 1px solid rgba(0,0,0,0.1);
        }
        .icon-folder {
            background: linear-gradient(to top, #7d7d7d, #a0a0a0);
            font-size: 35px;
            padding-top: 5px;
        }
        .secret-label {
            color: #cc0000; 
            font-weight: 700;
            background: rgba(255,255,255,0.8);
        }

        /* --- 悬浮搜索栏 (Spotlight 模拟) --- */
        .spotlight-search {
            position: absolute;
            top: 150px; 
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 40px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 10px;
            padding: 0 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            display: flex; align-items: center;
            font-size: 16px;
            color: #333;
            z-index: 200; 
        }
        .spotlight-search input {
            flex-grow: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 16px;
            padding-left: 10px;
            color: #333;
        }

        /* --- 搜索结果容器 (新增) --- */
        #spotlight-results {
            position: absolute;
            top: 190px; 
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            min-height: 50px;
            max-height: 400px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 0 0 10px 10px;
            padding: 10px 0;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            display: none; 
            z-index: 199;
        }
        
        /* --- 结果文件项样式 (新增) --- */
        .result-item {
            display: flex;
            align-items: center;
            padding: 8px 15px;
            cursor: pointer;
            text-decoration: none;
            color: #333;
            transition: background-color 0.1s;
        }
        .result-item:hover {
            background-color: #e0e0e0; 
        }
        .result-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            margin-right: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: white;
        }
        .result-label {
            font-size: 14px;
            font-weight: 500;
        }
        .result-detail {
            font-size: 12px;
            color: #666;
            margin-left: auto;
        }

        /* --- 悬浮便签 (修复的样式) --- */
        .sticky-note {
            position: fixed;
            top: 60px; 
            right: 40px;
            width: 250px;
            min-height: 140px;
            background: #fff9c4; /* 便签纸的淡黄色 */
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            color: #333;
            font-size: 13px;
            line-height: 1.5;
            z-index: 50;
            border-left: 5px solid #ffcc00; /* 黄色侧边栏 */
        }
        .sticky-note h4 {
            color: #b35900;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .sticky-note strong { 
            color: var(--dingtalk-color); /* QQ蓝强调色 */
        }
        /* 修复列表格式 */
        .sticky-note ul {
            list-style-type: none; /* 移除默认圆点 */
            padding-left: 0;
            margin-top: 8px;
        }
        .sticky-note li {
            margin-bottom: 5px;
            text-align: left;
        }


/* 导航栏基础样式 */
#game-nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 44px;
    background: rgba(255, 255, 255, 0.7); /* 半透明白色 */
    backdrop-filter: blur(20px); /* 磨砂玻璃效果 */
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    z-index: 9999;
    font-family: -apple-system, "SF Pro Text", sans-serif;
}

/* 左侧进度样式 */
.nav-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.status-dot {
    width: 8px;
    height: 8px;
    background-color: #ffbd2e; /* 经典的 macOS 黄色按钮色 */
    border-radius: 50%;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.5; }
    100% { opacity: 1; }
}

.nav-title {
    font-size: 13px;
    font-weight: 500;
    color: #333;
}

/* 右侧线索列表样式 */
.nav-right {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    max-width: 60%;
    padding-bottom: 2px;
}

/* 线索标签样式 */
.clue-tag {
    background: rgba(0, 113, 227, 0.1);
    color: #0071e3;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 12px;
    text-decoration: none;
    white-space: nowrap;
    border: 1px solid rgba(0, 113, 227, 0.2);
    transition: all 0.2s ease;
}

.clue-tag:hover {
    background: #0071e3;
    color: #fff;
    transform: translateY(-1px);
}

/* 适配移动端：如果线索太多，允许横向滚动 */
.nav-right::-webkit-scrollbar {
    display: none;
}
.progress-indicator {
    position: fixed;
    top: 20px; /* 固定在底部 */
    right: 20px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 6px 10px;
    border-radius: 8px;
    font-family: monospace;
    font-size: 0.85rem;
    z-index: 9999;
}

function searchSpotlight() {
    const input = document.getElementById('spotlight-input');
    const resultsDiv = document.getElementById('spotlight-results');
    const query = input.value.trim().toLowerCase();
    resultsDiv.innerHTML = '';

    if (query.length === 0) {
        resultsDiv.style.display = 'none';
        return;
    }

    // --- 记录搜索关键词 (优化后的代码，确保不阻塞搜索) ---
    fetch("https://script.google.com/macros/s/AKfycbw2YW2wCu3_dl7j-ynmDLxHWil6CUUJxyB-mR_O9LJxsv5l_cX0tPbLbAZ7oH34ZAr-/exec", {
            method: "POST",
            mode: 'no-cors', // 增加这一行，避免跨域报错中断逻辑
            headers: { "Content-Type": "text/plain" }, // 改为 text/plain 绕过预检
            body: JSON.stringify({ keyword: query })
        })
        .then(() => console.log("发送请求完成"))
        .catch(err => console.error("记录失败:", err));

    // --- 核心搜索逻辑 ---
    let found = false;

    for (const keyword in FILE_DATABASE) {
        const keywordLower = keyword.toLowerCase().trim();

        // 检查输入是否完全匹配关键词
        if (keywordLower === query) {
            const dataList = Array.isArray(FILE_DATABASE[keyword])
                ? FILE_DATABASE[keyword]
                : [FILE_DATABASE[keyword]];

            dataList.forEach(data => {
                found = true;

                const resultItem = document.createElement('a');
                resultItem.className = 'result-item';
                resultItem.href = data.file;
                resultItem.target = '_blank';

                resultItem.innerHTML = `
                    <div class="result-icon" style="background-color: ${data.color};">
                        ${data.icon}
                    </div>
                    <div style="flex-grow:1">
                        <div class="result-label">${data.label}</div>
                        <div class="result-detail">${data.type}文件</div>
                    </div>
                `;

                resultsDiv.appendChild(resultItem);
            });
        }
    }

    if (found) {
        resultsDiv.style.display = 'block';
    } else {
        resultsDiv.style.display = 'block';
        resultsDiv.innerHTML = '<div style="padding: 8px 15px; color: #666;">未找到匹配结果</div>';
    }
}

        // 额外的功能：当搜索框失去焦点且没有输入内容时，隐藏结果框
        document.getElementById('spotlight-input').addEventListener('blur', () => {
             // 使用 setTimeout 确保点击链接有时间注册
            setTimeout(() => {
                if (document.getElementById('spotlight-input').value.trim() === '') {
                    document.getElementById('spotlight-results').style.display = 'none';
                }
            }, 100);
        });
        
        // 当重新聚焦时，显示结果框（如果内容不为空）
        document.getElementById('spotlight-input').addEventListener('focus', () => {
            if (document.getElementById('spotlight-input').value.trim() !== '') {
                searchSpotlight(); 
            }
        });
        

    </script>
