<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>QQ Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "Helvetica Neue", sans-serif; }

        body {
            height: 100vh; width: 100vw; overflow: hidden;
            background-image: url('desk.jpg'); 
            background-size: cover; background-position: center; background-repeat: no-repeat;
            display: block; user-select: text;
        }

        .qq-window {
            width: 380px; background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px); border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); overflow: hidden;
            border: 0.5px solid rgba(255,255,255,0.4); transition: height 0.3s ease;
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 500; 
        }

        .window-bar { height: 38px; padding: 0 12px; display: flex; align-items: center; }
        .dots { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .close { background: #ff5f56; } .min { background: #ffbd2e; } .max { background: #27c93f; }

        .login-content { padding: 30px 40px 40px; text-align: center; }
        .avatar-container {
            width: 80px; height: 80px; margin: 0 auto 25px;
            background: #fff; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 45px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .input-box {
            width: 100%; background: rgba(255,255,255,0.6);
            border: 1px solid #dcdcdc; border-radius: 6px;
            padding: 10px 12px; font-size: 14px; margin-bottom: 4px; outline: none;
        }
        .input-box:focus { border-color: #007aff; background: #fff; }
        .input-box:disabled { background: rgba(0,0,0,0.08); color: #666; cursor: not-allowed; border: 1px solid #ccc; }

        /* 错误提示文字：调整了 margin-bottom 以缩小间距 */
        .error-msg { color: #ff3b30; font-size: 12px; text-align: left; height: 14px; margin-bottom: 4px; visibility: hidden; }

        .verify-row { display: none; gap: 8px; margin-bottom: 4px; }
        .verify-row .input-box { margin-bottom: 0; }
        
        .btn-send {
            width: 110px; background: #fff; border: 1px solid #007aff;
            border-radius: 6px; font-size: 12px; cursor: pointer; color: #007aff;
        }

        /* 登录按钮：调整了 margin-top */
        .btn-login {
            width: 100%; padding: 10px; background: #007aff; color: white;
            border: none; border-radius: 6px; font-size: 15px; font-weight: 500;
            cursor: pointer; margin-top: 2px; 
        }

        .switch-mode { margin-top: 20px; font-size: 13px; color: #007aff; cursor: pointer; }
        
         .mac-menubar {
                position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 28px;
    padding: 0 20px;
    box-sizing: border-box; /* 关键 */
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; font-size: 13px; color: #333; z-index: 1000;
        }
            .menubar-left span { margin-right: 15px; font-weight: 500; text-shadow: none; }
        .menubar-right span { margin-left: 15px; }
                                    .progress-indicator {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 6px 10px;
    border-radius: 8px;
    font-family: monospace;
    font-size: 0.85rem;
    z-index: 9999;
}
    </style>
</head><div class="progress-indicator">5/39</div>
<body>
    <div class="mac-menubar">
        <div class="menubar-left"><span></span><span>QQ</span><span>登录</span></div>
        <div class="menubar-right"><span>100%</span><span>Wi-Fi</span><span>2月10日 周二</span></div>
    </div>

    <div class="qq-window">
        <div class="window-bar">
            <div class="dots"><div class="dot close"></div><div class="dot min"></div><div class="dot max"></div></div>
        </div>

        <div class="login-content">
            <div class="avatar-container">🐧</div>
            
            <input type="text" id="account-input" class="input-box" placeholder="QQ号码">
            <div id="err-account" class="error-msg">手机号不正确</div>
            
            <input type="password" id="password-input" class="input-box" placeholder="请输入密码">
            <div id="err-pwd" class="error-msg">账号或密码错误</div>

            <div id="sms-row" class="verify-row">
                <input type="text" id="v-code" class="input-box" placeholder="验证码" maxlength="4">
                <button id="send-btn" class="btn-send" onclick="window.open('message.html','_blank')">获取验证码</button>
            </div>
            <div id="err-vcode" class="error-msg">验证码错误</div>

            <button id="main-btn" class="btn-login" onclick="handleLogic()">登 录</button>

            <div class="switch-mode" id="mode-text" onclick="toggleToForgot()">找回密码</div>
        </div>
    </div>

<script>
let currentStep = 'LOGIN'; 

const accountInput = document.getElementById('account-input');
const pwdInput = document.getElementById('password-input');
const smsRow = document.getElementById('sms-row');
const modeText = document.getElementById('mode-text');
const mainBtn = document.getElementById('main-btn');

const errAccount = document.getElementById('err-account');
const errPwd = document.getElementById('err-pwd');
const errVcode = document.getElementById('err-vcode');

function showError(el, msg) {
    el.innerText = msg;
    el.style.visibility = 'visible';
}

function hideErrors() {
    errAccount.style.visibility = 'hidden';
    errPwd.style.visibility = 'hidden';
    errVcode.style.visibility = 'hidden';
}

function toggleToForgot() {
    if (currentStep === 'LOGIN') {
        currentStep = 'FORGOT';
        hideErrors();
        accountInput.value = '';
        accountInput.placeholder = '输入绑定的手机号';
        pwdInput.style.display = 'none';
        modeText.innerText = '返回登录';
        mainBtn.innerText = '确 认';
    } else {
        location.reload(); 
    }
}

function handleLogic() {
    hideErrors();
    const accountValue = accountInput.value.replace(/\s+/g,'');
    const pwdValue = pwdInput.value.replace(/\s+/g,'');
    const vCodeValue = document.getElementById('v-code').value.replace(/\s+/g,'');

    if (currentStep === 'LOGIN') {
        showError(errPwd, '账号或密码错误');
    } 
    else if (currentStep === 'FORGOT') {
        if (accountValue === '11211568544') {
            currentStep = 'VERIFY_ALL';
            accountInput.disabled = true; 
            pwdInput.style.display = 'block'; 
            pwdInput.value = '';
            pwdInput.placeholder = '我的小名+St@yP0$1t!v3';
            smsRow.style.display = 'flex'; 
            mainBtn.innerText = '立即找回';
        } else {
            showError(errAccount, '该手机号未绑定');
        }
    } 
    else if (currentStep === 'VERIFY_ALL') {
        let hasError = false;
        if (pwdValue !== 'guoguostaypositive') {
            showError(errPwd, '密码错误，需全部使用小写字母（无符号）');
            hasError = true;
        }
        if (vCodeValue !== '5649') {
            showError(errVcode, '验证码错误');
            hasError = true;
        }
        if (!hasError) {
            mainBtn.innerText = '正在跳转...';
            setTimeout(() => { window.location.href = 'qq.html'; }, 800);
        }
    }
}
</script>
</body>
</html>
