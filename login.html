<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>QQ Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "Helvetica Neue", sans-serif; }

   body {
         height: 100vh;
            width: 100vw;
            overflow: hidden;
           background-image: url('desk.jpg'); 
            /* 2. 确保图片覆盖整个屏幕 */
            background-size: cover; 
            /* 3. 让图片居中显示 */
            background-position: center;
            /* 4. 防止图片在小窗口时重复显示 */
            background-repeat: no-repeat;
            display: block;
            user-select: text;
        }

        .qq-window {
            width: 380px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            overflow: hidden;
            border: 0.5px solid rgba(255,255,255,0.4);
            transition: height 0.3s ease;
                        position: fixed; 
            top: 50%;         
            left: 50%;        
            transform: translate(-50%, -50%); 
            z-index: 500; 
        }

        .window-bar { height: 38px; padding: 0 12px; display: flex; align-items: center; }
        .dots { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .close { background: #ff5f56; } .min { background: #ffbd2e; } .max { background: #27c93f; }

        .login-content { padding: 30px 40px 40px; text-align: center; }
        .avatar-container {
            width: 80px; height: 80px; margin: 0 auto 25px;
            background: #fff; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 45px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* 输入框共有样式 */
        .input-box {
            width: 100%;
            background: rgba(255,255,255,0.6);
            border: 1px solid #dcdcdc;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
        }
        .input-box:focus { border-color: #007aff; background: #fff; }

        /* 验证码行 */
        .verify-row { display: none; gap: 8px; margin-bottom: 12px; }
        .verify-row .input-box { margin-bottom: 0; }
        
        .btn-send {
            width: 110px; background: #fff; border: 1px solid #dcdcdc;
            border-radius: 6px; font-size: 12px; cursor: pointer;
        }
        .btn-send:disabled { color: #999; background: #f5f5f5; }

        .btn-login {
            width: 100%; padding: 10px; background: #007aff; color: white;
            border: none; border-radius: 6px; font-size: 15px; font-weight: 500;
            cursor: pointer; margin-top: 10px;
        }

        .switch-mode {
            margin-top: 20px; font-size: 13px; color: #007aff; cursor: pointer;
        }
                            .progress-indicator {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 6px 10px;
    border-radius: 8px;
    font-family: monospace;
    font-size: 0.85rem;
    z-index: 9999;
}
    </style>                             <div class="progress-indicator">5/36</div></head>
<body>

    <div class="qq-window">
        <div class="window-bar">
            <div class="dots"><div class="dot close"></div><div class="dot min"></div><div class="dot max"></div></div>
        </div>

        <div class="login-content">
            <div class="avatar-container">🐧</div>
            
            <input type="text" id="account-input" class="input-box" placeholder="QQ号码/手机号">
            
            <input type="password" id="password-input" class="input-box" placeholder="请输入密码">

            <div id="sms-row" class="verify-row">
                <input type="text" id="v-code" class="input-box" placeholder="验证码" maxlength="4">
                <button id="send-btn" class="btn-send" onclick="startTimer()">获取验证码</button>
            </div>

            <button class="btn-login" onclick="handleLogin()">登 录</button>

            <div class="switch-mode" id="mode-text" onclick="toggleMode()">短信验证码登录</div>
        </div>
    </div>

<script>
    let isSMSMode = false;
    let timer = null;

    function toggleMode() {
        isSMSMode = !isSMSMode;
        const pwdInput = document.getElementById('password-input');
        const smsRow = document.getElementById('sms-row');
        const modeText = document.getElementById('mode-text');
        const accountInput = document.getElementById('account-input');

        if (isSMSMode) {
            pwdInput.style.display = 'none';
            smsRow.style.display = 'flex';
            modeText.innerText = '账号密码登录';
            accountInput.placeholder = '手机号';
        } else {
            pwdInput.style.display = 'block';
            smsRow.style.display = 'none';
            modeText.innerText = '短信验证码登录';
            accountInput.placeholder = 'QQ号码/手机号';
        }
    }

function startTimer() {
    const phone = document.getElementById('account-input').value.replace(/\s+/g, ''); 
    if (phone !== '11211568544') {
        alert('请输入正确的手机以获取验证码');
        return;
    }

    // 1. 发送验证码到本地存储
    const smsData = {
        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
        code: '5649'
    };
    localStorage.setItem('qq_v_code', JSON.stringify(smsData));

    // 2. 核心修改：跳转到消息页面 (如果你希望在原窗口打开)
    window.open('message.html', '_blank'); 


    // 以下是原有的倒计时逻辑（如果页面跳转了，原页面的倒计时会随之消失）
    let seconds = 60;
    const btn = document.getElementById('send-btn');
    btn.disabled = true;
    
    timer = setInterval(() => {
        seconds--;
        btn.innerText = `${seconds}s`;
        if (seconds <= 0) {
            clearInterval(timer);
            btn.disabled = false;
            btn.innerText = "获取验证码";
        }
    }, 1000);
}

    function handleLogin() {
        const account = document.getElementById('account-input').value.replace(/\s+/g, '');
        const btn = document.querySelector('.btn-login');

        if (isSMSMode) {
            const code = document.getElementById('v-code').value;
            if (account === '11211568544' && code === '5649') {
                loginSuccess(btn);
            } else {
                alert('验证码错误，请查看短信');
            }
        } else {
            if (account !== '') {
                loginSuccess(btn);
            } else {
                alert('请输入账号');
            }
        }
    }

    function loginSuccess(btn) {
        btn.innerText = '正在登录...';
        document.body.style.cursor = 'wait';
        setTimeout(() => {
            window.location.href = 'qq.html'; // 登录成功跳转
        }, 1000);
    }
</script>
</body>
</html>
