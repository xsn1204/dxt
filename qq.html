<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QQ PC版</title>
    <style>
        :root {
            --side-bar-bg: #f3f3f3;
            --chat-list-bg: #fff;
            --active-blue: #0099ff;
            --msg-self-bg: #0099ff;
            --msg-other-bg: #f2f2f2;
            --border-color: #e5e5e5;
        }

        body, html {
            
            margin: 0; padding: 0;
            height: 100%; font-family: "Microsoft YaHei", sans-serif;
            background-color: #2c3e50; /* 默认深色背景 */
            background-image: url('desk.jpg'); 
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            display: block;
            user-select: text;
                   height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        

        .qq-window {
            width: 960px; height: 680px;
            background: #fff;
            display: flex;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 4px; overflow: hidden;
            position: fixed; 
            top: 50%;         
            left: 50%;        
            transform: translate(-50%, -50%); 
            z-index: 500; 
        }

        .sidebar {
            width: 60px; background: var(--side-bar-bg);
            display: flex; flex-direction: column;
            align-items: center; padding: 20px 0;
            border-right: 1px solid var(--border-color);
        }
        .sidebar img.my-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            margin-bottom: 25px; cursor: pointer;  /* 灰色头像，显示离线 */
        }
        .nav-icon {
            font-size: 20px; color: #666;
            margin-bottom: 25px; cursor: pointer;
        }
        .nav-icon.active { color: var(--active-blue); }

        .chat-list-panel {
            width: 250px; background: var(--chat-list-bg);
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column;
        }
        .search-container { padding: 15px; display: flex; gap: 8px; }
        .search-bar { flex: 1; background: #eee; border: none; border-radius: 4px; padding: 5px 10px; font-size: 12px; }
        
        .chat-items { overflow-y: auto; flex: 1; }
        .chat-item {
            padding: 12px 15px; display: flex; align-items: center;
            cursor: pointer; transition: background 0.2s;
        }
        .chat-item:hover { background: #f5f5f5; }
        .chat-item.active { background: #e5f3ff; }
        .chat-item img { width: 40px; height: 40px; border-radius: 4px; margin-right: 12px; }
        .item-info { flex: 1; overflow: hidden; }
        .item-name { font-size: 14px; margin-bottom: 4px; color: #333; }
        .item-msg { font-size: 12px; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-meta { text-align: right; }
        .item-time { font-size: 11px; color: #bbb; }
        .unread { background: #ccc; color: #fff; font-size: 10px; padding: 1px 5px; border-radius: 10px; margin-top: 4px; display: inline-block; }

        .main-chat { flex: 1; display: flex; flex-direction: column; position: relative; background: #f9f9f9; }
        .chat-header {
            height: 60px; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color); background: #fff;
        }
        .header-left { display: flex; align-items: center; gap: 8px; font-size: 16px; }
        .offline-status { width: 10px; height: 10px; background: #bdc3c7; border-radius: 50%; }

        .chat-content {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 20px;
        }
        
        .system-msg { align-self: center; background: rgba(0,0,0,0.05); color: #888; font-size: 12px; padding: 4px 12px; border-radius: 10px; }
        
        .bubble-row { display: flex; gap: 10px; max-width: 85%; }
        .bubble-content {
            padding: 8px 12px; border-radius: 6px; font-size: 14px;
            line-height: 1.5; background: #fff; border: 1px solid #eee;
        }
        .expired-img {
            width: 150px; height: 100px; background: #eee; 
            display: flex; align-items: center; justify-content: center;
            color: #bbb; font-size: 12px; border-radius: 4px; margin-top: 5px;
        }

        .chat-footer {
            height: 180px; border-top: 1px solid var(--border-color);
            background: #fff; display: flex; flex-direction: column; opacity: 0.8;
        }
        .toolbar { padding: 8px 15px; display: flex; gap: 15px; color: #999; font-size: 18px; }
        #messageInput {
            flex: 1; border: none; outline: none; padding: 0 15px;
            background: transparent; font-size: 14px; resize: none; color: #999;
        }
        .footer-action { padding: 10px 15px; display: flex; justify-content: flex-end; }
        .btn-send { background: #eee; border: 1px solid #ddd; padding: 4px 15px; border-radius: 3px; color: #bbb; cursor: not-allowed; }
                       .mac-menubar {
            position: absolute; top: 0; left: 0; width: 100%; height: 28px;
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; font-size: 13px; color: #333; z-index: 1000;
        }
            .menubar-left span { margin-right: 15px; font-weight: 500; text-shadow: none; }
        .menubar-right span { margin-left: 15px; }

                            .progress-indicator {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 6px 10px;
    border-radius: 8px;
    font-family: monospace;
    font-size: 0.85rem;
    z-index: 9999;
}
    </style>                             <div class="progress-indicator">13/39</div></head>
<body>
        <div class="mac-menubar">
        <div class="menubar-left">
            <span></span>
            <span>QQ</span>
            <span>对话</span>
            <span>窗口</span>
        </div>
        <div class="menubar-right">
                      <span>100%</span>
            <span>Wi-Fi</span>
            <span>2月10日 周二</span>
        </div>
    </div>


    <div class="qq-window">
        <div class="sidebar">
            
            <img src="avatar3.png" class="my-avatar">
            <div class="nav-icon active">💬</div>
            <div class="nav-icon">👤</div>
   <div class="nav-icon" onclick="window.open('qqzone.html','_blank')" style="cursor:pointer;">⭐</div>
  <div class="nav-icon" onclick="window.open('email.html','_blank')" style="cursor:pointer;">📧</div>
            <div class="nav-icon" style="margin-top: auto;">🐣</div>
            <div class="nav-icon">≡</div>
        </div>

        <div class="chat-list-panel">
            <div class="search-container">
                <input type="text" class="search-bar" placeholder="搜索最近联系人">
            </div>
            <div class="chat-items">
                <div class="chat-item active" onclick="switchChat('腾讯新闻', this, 'news')">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=news" onerror="this.src='https://api.dicebear.com/7.x/identicon/svg?seed=news'">
                    <div class="item-info">
                        <div class="item-name">腾讯新闻</div>
                        <div class="item-msg">[精选] 那些年我们追过的互联网回忆...</div>
                    </div>
                    <div class="item-meta">
                        <div class="item-time">2025/12/31</div>
                    </div>
                </div>
                <div class="chat-item" onclick="switchChat('QQ邮箱提醒', this, 'mail')">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=mail">
                    <div class="item-info">
                        <div class="item-name">QQ邮箱提醒</div>
                        <div class="item-msg">您有 158 封未读邮件未处理</div>
                    </div>
                    <div class="item-meta">
                        <div class="item-time">2025/9/28</div>
                        <div class="unread">99+</div>
                    </div>
                </div>
                <div class="chat-item" onclick="switchChat('群助手', this, 'group')">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=folder">
                    <div class="item-info">
                        <div class="item-name">群助手</div>
                        <div class="item-msg">2个群有新消息</div>
                    </div>
                    <div class="item-meta">
                        <div class="item-time">2024/10/20</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-chat">
            <div class="chat-header">
                <div class="header-left">
                    <span id="currentChatName">腾讯新闻</span>
                    <div class="offline-status"></div>
                </div>
                <div class="header-tools">
                    <span>⚙️</span>
                </div>
            </div>

            <div class="chat-content" id="chatContent">
                <div class="system-msg">2025年12月31日 10:00</div>
                <div class="bubble-row">
                    <div class="bubble-content">
                        <strong>[今日精选] 时代记忆：那些年我们一起用过的QQ头像</strong>
                        <br>
                        点击查看详情 >
                    </div>
                </div>
                             <div class="system-msg">2025年2月04日 10:00</div>
               <div class="bubble-row"    onclick="window.open('news2.html', '_blank')" style="cursor: pointer; ">
    <div class="bubble-content">
        <strong>[本地资讯] 芝心芝味破产：一代知名蛋糕品牌为何走到今天？</strong>
        <br>
        点击查看详情 &gt;
    </div>
</div>
            
            </div>

            <div class="chat-footer">
                <div class="toolbar">
                    <span>😊</span> <span>🖼️</span> <span>📁</span>
                </div>
                <textarea id="messageInput" placeholder="" disabled></textarea>
                <div class="footer-action">
                    <button class="btn-send">发送(S)</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const content = document.getElementById('chatContent');

        function switchChat(name, element, type) {
            document.getElementById('currentChatName').innerText = name;
            document.querySelectorAll('.chat-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            if(type === 'news') {
                content.innerHTML = `
                    <div class="system-msg">2025年12月31日 10:00</div>
                    <div class="bubble-row">
                        <div class="bubble-content"><strong>[今日精选] 时代记忆：那些年我们一起用过的QQ头像</strong><br>点击查看详情 ></div>
                    </div>
                      <div class="system-msg">2025年2月04日 10:00</div>
                                   <div class="bubble-row"    onclick="window.open('news2.html', '_blank')" style="cursor: pointer;">
    <div class="bubble-content">
        <strong>[本地资讯] 芝心芝味破产：一代知名蛋糕品牌为何走到今天？</strong>
        <br>
        点击查看详情 &gt;
    </div>
</div>
                `;
                
                
            } else if(type === 'mail') {
                content.innerHTML = `
                    <div class="system-msg">2025年9月28日</div>
                    <div class="bubble-row">
                        <div class="bubble-content">您收到一封来自“系统管理员”的邮件：您的空间存储容量已接近上限。</div>
                    </div>
                `;
            } else {
                content.innerHTML = `
                    <div class="system-msg">2024年10月20日</div>
                    <div class="bubble-row">
                        <div class="bubble-content">
                            [图片]
                            <div class="expired-img">图片已过期</div>
                        </div>
                    </div>
                    <div class="system-msg">该群因长期无发言已归档</div>
                `;
            }
        }
    </script>
</body>
</html>
